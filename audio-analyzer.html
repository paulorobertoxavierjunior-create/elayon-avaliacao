<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elayon - Painel de Análise de Áudio</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0a0a0f; color: #00ffcc; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: #111; padding: 20px; border-radius: 10px; border: 1px solid #222; }
        h1 { text-align: center; margin-bottom: 30px; }
        .metric { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #222; }
        .label { color: #aaa; }
        .value { font-size: 1.2em; font-weight: bold; }
        #textoCapturado { margin-top: 20px; padding: 15px; background: #0a0a0f; border: 1px solid #333; min-height: 100px; }
        button { background: #00ffcc; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; margin: 5px; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        .status { text-align: center; margin: 15px 0; padding: 10px; border-radius: 5px; }
        .status.active { background: rgba(0,255,204,0.1); border: 1px solid #00ffcc; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔊 PAINEL DE ANÁLISE DE ÁUDIO CRS</h1>
        
        <div id="statusBox" class="status">Aguardando início...</div>

        <div class="metric">
            <span class="label">Tempo Total:</span>
            <span class="value" id="duration">--s</span>
        </div>
        <div class="metric">
            <span class="label">Tempo Falando:</span>
            <span class="value" id="speaking">--s</span>
        </div>
        <div class="metric">
            <span class="label">Taxa de Silêncio:</span>
            <span class="value" id="silence">--%</span>
        </div>
        <div class="metric">
            <span class="label">Quantidade de Pausas:</span>
            <span class="value" id="pauses">--</span>
        </div>
        <div class="metric">
            <span class="label">Média de Pausa:</span>
            <span class="value" id="meanPause">--ms</span>
        </div>

        <h3>Texto Transcrito:</h3>
        <div id="textoCapturado">Aguardando captura...</div>

        <h3>Payload Final (JSON):</h3>
        <pre id="jsonOutput">{}</pre>

        <button id="btnStart" onclick="iniciarCaptura()">TESTAR CAPTURA</button>
        <button id="btnStop" onclick="pararCaptura()" disabled>PARAR E GERAR JSON</button>
        <button onclick="baixarJSON()">BAIXAR JSON</button>
    </div>

    <script>
        // ==========================================
        // 🧠 MOTOR DE ANÁLISE DE ÁUDIO LOCAL
        // ==========================================
        
        let audioAnalysis = {
            startTime: null,
            endTime: null,
            totalSilenceTime: 0,
            pauseCount: 0,
            lastSoundTime: 0,
            isRunning: false
        };

        let dadosFinais = null;
        let recognition = null;

        function startAudioAnalysis() {
            audioAnalysis = {
                startTime: Date.now(),
                endTime: null,
                totalSilenceTime: 0,
                pauseCount: 0,
                lastSoundTime: Date.now(),
                isRunning: true
            };
            console.log("Iniciando análise...");
        }

        function registerSound() {
            if (!audioAnalysis.isRunning) return;
            
            const now = Date.now();
            const silenceDuration = now - audioAnalysis.lastSoundTime;
            
            if (silenceDuration > 1500) { // > 1.5s considera pausa
                audioAnalysis.pauseCount++;
                audioAnalysis.totalSilenceTime += silenceDuration;
                console.log(`Pausa: ${(silenceDuration/1000).toFixed(1)}s`);
            }
            
            audioAnalysis.lastSoundTime = now;
        }

        function stopAudioAnalysis() {
            if (!audioAnalysis.isRunning) return null;
            
            audioAnalysis.endTime = Date.now();
            audioAnalysis.isRunning = false;
            
            const totalTimeSec = (audioAnalysis.endTime - audioAnalysis.startTime) / 1000;
            const speakingTimeSec = totalTimeSec - (audioAnalysis.totalSilenceTime / 1000);
            const silencePercentage = totalTimeSec > 0 ? 
                ((audioAnalysis.totalSilenceTime / 1000) / totalTimeSec) * 100 : 0;
            
            const result = {
                duration_sec: parseFloat(totalTimeSec.toFixed(2)),
                speaking_time_sec: parseFloat(speakingTimeSec.toFixed(2)),
                silence_pct: parseFloat(silencePercentage.toFixed(1)),
                pause_count: audioAnalysis.pauseCount,
                mean_pause_ms: audioAnalysis.pauseCount > 0 ? 
                    parseFloat((audioAnalysis.totalSilenceTime / audioAnalysis.pauseCount).toFixed(0)) : 0
            };
            
            console.log("Análise concluída:", result);
            return result;
        }

        // ==========================================
        // 🔌 INTERFACE COM A TELA
        // ==========================================

        function atualizarPainel(dados) {
            if(!dados) return;
            document.getElementById('duration').textContent = dados.duration_sec + 's';
            document.getElementById('speaking').textContent = dados.speaking_time_sec + 's';
            document.getElementById('silence').textContent = dados.silence_pct + '%';
            document.getElementById('pauses').textContent = dados.pause_count;
            document.getElementById('meanPause').textContent = dados.mean_pause_ms + 'ms';
            document.getElementById('jsonOutput').textContent = JSON.stringify(dados, null, 2);
            dadosFinais = dados;
        }

        function atualizarTexto(texto) {
            document.getElementById('textoCapturado').textContent = texto;
            if(texto && texto.trim().length > 0) {
                registerSound(); // Marca atividade
            }
        }

        function setStatus(texto, ativo = false) {
            const box = document.getElementById('statusBox');
            box.textContent = texto;
            box.classList.toggle('active', ativo);
        }

        function baixarJSON() {
            if(!dadosFinais) {
                alert("Nenhum dado para baixar! Capture primeiro.");
                return;
            }
            const payloadCompleto = {
                text: document.getElementById('textoCapturado').textContent,
                theme: "TESTE - ANÁLISE DE ÁUDIO",
                context: "Debug Ferramenta",
                metrics: dadosFinais
            };
            
            const blob = new Blob([JSON.stringify(payloadCompleto, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `analise-audio-${Date.now()}.json`;
            a.click();
        }

        // ==========================================
        // 🎤 CAPTURA DE VOZ
        // ==========================================


// ==========================================
// 🎤 CAPTURA DE VOZ COM SISTEMA DE PING
// ==========================================

let recognition = null;
let pingTimer = null; // O relógio que vai manter acordado

function iniciarCaptura() {
    if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
        alert("Seu navegador não suporta reconhecimento de voz. Use Chrome.");
        return;
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();

    // 🔥 CONFIGURAÇÕES BASE
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'pt-BR';

    recognition.onstart = () => {
        startAudioAnalysis();
        setStatus("🎙️ CAPTURA ATIVA... (Modo Imortal ativado)", true);
        document.getElementById('btnStart').disabled = true;
        document.getElementById('btnStop').disabled = false;
        atualizarTexto("");

        // ==========================================
        // 🛰️ SISTEMA DE PING - O SEGREDO
        // ==========================================
        // Dispara a cada 2 segundos para "enganar" o Chrome
        pingTimer = setInterval(() => {
            console.log("🔔 PING - Mantendo conexão viva...");
            // A gente registra um "evento fantasma" só pra atualizar o tempo
            // mas sem contar como som real, só pra não deixar o timer do Chrome zerar
            if (audioAnalysis.isRunning) {
                 // Não precisamos fazer nada, só o fato do intervalo rodar já ajuda
                 // Mas podemos usar para atualizar o relógio na tela se quiser
            }
        }, 2000); // 2000ms = 2 segundos
    };

    recognition.onresult = (event) => {
        let transcript = "";
        for (let i = event.index; i < event.results.length; i++) {
            transcript += event.results[i][0].transcript;
        }
        transcript = transcript.trim();
        atualizarTexto(transcript);

        // ==========================================
        // 🛑 COMANDO DE PARADA AUTOMÁTICA
        // ==========================================
        // Verifica se falou "OK OK" ou "OK" no final
        const textoLower = transcript.toLowerCase();
        
        if (textoLower.endsWith("ok ok") || textoLower.includes(" ok ok ") || 
            textoLower.endsWith("ok") || textoLower.includes(" ok ")) { 
            
            // Opcional: Ajusta a condição se quiser só "ok ok"
            console.log("🛑 Comando 'OK' detectado! Finalizando...");
            pararCaptura(); // Chama a função de parar
        }
    };

    recognition.onerror = (event) => {
        console.error("Erro:", event.error);
        // Ignora erro de no-speech
    };

    // 🔄 O Loop da Imortalidade
    recognition.onend = () => {
        // Se ainda estamos no modo ativo (botão de parar está liberado)
        if (document.getElementById('btnStop').disabled === false) {
            console.log("🔄 Microfone parou, reiniciando imediatamente...");
            recognition.start();
        }
    };

    recognition.start();
}

function pararCaptura() {
    // Para o timer do Ping primeiro
    if (pingTimer) {
        clearInterval(pingTimer);
        pingTimer = null;
        console.log("🛑 Sistema de Ping desativado.");
    }

    // Para o reconhecimento de voz
    if (recognition) {
        recognition.stop();
        recognition = null;
    }
    
    // Calcula os resultados finais
    dadosFinais = stopAudioAnalysis();
    atualizarPainel(dadosFinais);
    setStatus("✅ CONCLUÍDO! Dados gerados.");
    document.getElementById('btnStart').disabled = false;
    document.getElementById('btnStop').disabled = true;
}
