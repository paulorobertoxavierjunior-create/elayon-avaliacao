<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistemas Elayon • PRESENÇA</title>

  <style>
    :root {
      --bg: #050607;
      --panel: #0b0d0f;
      --panel-2: #11161b;
      --ink: #f4f6f8;
      --muted: #98a2ad;
      --line: #1b2026;
      --soft: #d7dee8;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
    }

    .shell {
      width: 100%;
      max-width: 820px;
      min-height: 100dvh;
      padding: 28px 22px 34px;
    }

    .acao {
      margin-top: 10px;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #2b333d;
      background: #11161b;
      color: #fff;
      cursor: pointer;
      font-weight: bold;
    }

    #logTech {
      margin-top: 20px;
      white-space: pre-wrap;
      font-size: 12px;
      color: #6c7682;
      border-top: 1px solid #1b2026;
      padding-top: 14px;
    }
  </style>
</head>

<body>
  <main class="shell">

    <h1>Sistemas Elayon • PRESENÇA</h1>

    <button class="acao" onclick="runTunnelTests()">
      Rodar Diagnóstico Completo
    </button>

    <button class="acao" onclick="document.getElementById('logTech').textContent = ''">
      Limpar Log
    </button>

    <pre id="logTech"></pre>

  </main>

  <!-- ORDEM CORRETA (CRÍTICO) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="boot-auth.js"></script>
  <script src="tunnel.js"></script>
  <script src="teste-runner.js"></script> <!-- 👈 ESSENCIAL -->
  <script src="memoria.js"></script>
  <script src="cockpit.js"></script>

</body>
</html>
