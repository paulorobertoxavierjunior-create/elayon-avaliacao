<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check Túnel Elayon</title>
  <style>
    body { font-family: Arial; background:#081018; color:#fff; padding:20px; }
    button { margin:6px 6px 6px 0; padding:12px 16px; border:none; border-radius:8px; cursor:pointer; }
    pre { background:#111a22; padding:16px; border-radius:12px; white-space:pre-wrap; }
  </style>
</head>
<body>
  <h1>Check do Túnel</h1>

  <button id="btnHealth">Healthcheck</button>
  <button id="btnTTS">Testar TTS</button>
  <button id="btnMic">Testar Microfone</button>
  <button id="btnSTT">Testar Transcrição</button>
  <button id="btnLoop">Testar Loop</button>

  <pre id="out">Aguardando...</pre>

  <script src="https://paulorobertoxavierjunior-create.github.io/elayon-presenca-lab/js/base.js"></script>
  <script src="https://paulorobertoxavierjunior-create.github.io/elayon-presenca-lab/js/tunnel-lab.js"></script>

  <script>
    const out = document.getElementById("out");

    function print(obj) {
      out.textContent = typeof obj === "string" ? obj : JSON.stringify(obj, null, 2);
    }

    document.getElementById("btnHealth").addEventListener("click", async () => {
      try {
        const r = await window.ELAYON_TUNNEL.healthcheck();
        print(r);
      } catch (e) {
        print(e.message);
      }
    });

    document.getElementById("btnTTS").addEventListener("click", async () => {
      try {
        const r = await window.ELAYON_TUNNEL.tts.speak("Teste de voz do túnel Elayon.");
        print(r);
      } catch (e) {
        print(e.message);
      }
    });

    document.getElementById("btnMic").addEventListener("click", async () => {
      try {
        const r = await window.ELAYON_TUNNEL.mic.open();
        print(r);
      } catch (e) {
        print(e.message);
      }
    });

    document.getElementById("btnSTT").addEventListener("click", async () => {
      try {
        const r = await window.ELAYON_TUNNEL.stt.listenOnce({
          silenceMs: 3000,
          onPartial: (data) => print(data)
        });
        print(r);
      } catch (e) {
        print(e.message);
      }
    });

    document.getElementById("btnLoop").addEventListener("click", async () => {
      try {
        const r = await window.ELAYON_TUNNEL.loop.runStep({
          instruction: "Bom dia. Quando ouvir o bip, diga apenas sim.",
          context: "teste de conexão do túnel",
          sourceText: "resposta curta"
        });
        print(r);
      } catch (e) {
        print(e.message);
      }
    });
  </script>
</body>
</html>
