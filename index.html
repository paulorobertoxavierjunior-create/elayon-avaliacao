<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistemas Elayon • PRESENÇA</title>

  <style>
    :root {
      --bg: #050607;
      --panel: #0b0d0f;
      --panel-2: #11161b;
      --ink: #f4f6f8;
      --muted: #98a2ad;
      --line: #1b2026;
      --soft: #d7dee8;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
    }

    .shell {
      width: 100%;
      max-width: 820px;
      min-height: 100dvh;
      padding: 28px 22px 34px;
    }

    .acao {
      margin-top: 10px;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #2b333d;
      background: #11161b;
      color: #fff;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
    }

    #logTech {
      margin-top: 20px;
      white-space: pre-wrap;
      font-size: 12px;
      color: #6c7682;
      border-top: 1px solid #1b2026;
      padding-top: 14px;
      min-height: 80px;
    }

    /* Estilo dos campos de texto */
    .campo {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 12px;
      border: 1px solid #2b333d;
      background: var(--panel);
      color: var(--ink);
      font-size: 16px;
    }

/* === NOVO: CONTROLE DE TELAS === */
.tela { display: none; }
.tela.show { display: block; }

/* === NOVO: ESTILO CAIXA DE INTERAÇÃO === */
#statusSessao {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 10px;
}

#textoVivo {
  background: var(--panel-2);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 20px;
  margin: 15px 0;
  min-height: 120px;
  font-size: 18px;
  line-height: 1.6;
  white-space: pre-wrap;
}

#relatorioFinal {
  background: var(--panel-2);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 20px;
  margin: 15px 0;
  white-space: pre-wrap;
  font-size: 14px;
  line-height: 1.5;
}

  </style>
</head>

<body>
  <main class="shell">

    <div id="telaIntro">
      <h1>Sistema Elayon • PRESENÇA</h1>


      <!-- 👇 CAMPO PARA DIGITAR O TEMA 👇 -->
      <input type="text" id="inpTema" class="campo" placeholder="Digite o tema da sessão...">
      
      <!-- 👇 CAMPO PARA DIGITAR O CONTEXTO 👇 -->
      <input type="text" id="inpContexto" class="campo" placeholder="Digite o contexto (opcional)...">

      <button id="btnIniciar" class="acao">
        Rodar Diagnóstico / Iniciar Sessão
      </button>

      <button class="acao" onclick="document.getElementById('logTech').textContent = ''">
        Limpar Log
      </button>

      <div id="statusIntro" style="margin-top: 15px; color: #98a2ad;">Status: Aguardando...</div>
      <pre id="logTech">Logs aparecerão aqui...</pre>
    </div>

    <div id="telaSessao" class="tela">
      <div id="statusSessao"></div>
      <div id="textoVivo"></div>
      <button id="btnNovaSessao" style="display:none;"></button>
    </div>

    <div id="telaFinal" class="tela">
      <div id="relatorioFinal"></div>
      <button id="btnGerarPdf" style="display:none;"></button>
    </div>

  </main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="boot-auth.js"></script>
<script src="tunnel.js"></script>
<script src="teste-runner.js"></script>
<script src="memoria.js"></script>

<!-- 👇 COLOCA ESSE SCRIPT AQUI 👇 -->
<script>
window.ELAYON_TUNNEL = window.ELAYON_TUNNEL || {};
window.ELAYON_TUNNEL.healthcheck = window.ELAYON_TUNNEL.healthcheck || (async () => ({
  authenticated: true,
  stt: !!window.ELAYON_TUNNEL?.stt,
  tts: !!window.ELAYON_TUNNEL?.tts,
  crs: !!window.ELAYON_TUNNEL?.crs
}));
</script>

<script src="cockpit.js"></script>


</body>
</html>
