<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Elayon - Cockpit</title>
    <style>
        /* Estilo básico para não ficar feio */
        body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; }
       .tela { background: white; padding: 25px; margin: 15px 0; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        input, button { padding: 12px; margin: 8px 0; width: 100%; border-radius: 8px; border: 1px solid #ddd; }
        button { background: #000; color: #fff; font-weight: bold; cursor: pointer; }
       .status { color: #666; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>Sistemas Elayon • PRESENÇA</h1>

    <!-- 👇 ELEMENTOS COM OS IDS QUE FALTAVAM 👇 -->

    <div id="telaintro" class="tela">
        <h2>Bem-vindo ao Cockpit</h2>
        <p>Pronto para iniciar sua análise de presença.</p>
        <button id="btnIniciar">Iniciar Nova Sessão</button>
        <div id="statusIntro" class="status">Aguardando início...</div>
    </div>

    <div id="telaSessao" class="tela" style="display:none;">
        <label>Tema da Sessão:</label>
        <input type="text" id="inpTema" placeholder="Digite o tema">
        
        <label>Contexto:</label>
        <input type="text" id="inpContexto" placeholder="Descreva o contexto">

        <button id="btnNovaSessao">Começar Captura</button>
        <div id="statusSessao" class="status">Status: Pronto</div>
        <div id="textoVivo" class="status">Texto aparecerá aqui em tempo real...</div>
    </div>

    <div id="telaFinal" class="tela" style="display:none;">
        <h2>Relatório Final</h2>
        <div id="relatorioFinal">
            <!-- O resultado vai aparecer aqui -->
            Análise concluída. Resultados abaixo.
        </div>
        <button id="btnGerarPdf">Baixar Relatório em PDF</button>
    </div>

</body>
</html>
