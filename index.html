<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Elayon Presença</title>

<style>
body {
  background:#0b141a;
  color:#e6f1f5;
  font-family:Arial;
  padding:20px;
}

.card {
  background:#121e26;
  padding:20px;
  border-radius:12px;
  margin-bottom:16px;
}

button {
  padding:12px 16px;
  border:none;
  border-radius:8px;
  margin:5px;
  cursor:pointer;
}

.primary { background:#3ec6a8; color:#000; }
.secondary { background:#1f2f3a; color:#fff; }

#cronometro {
  font-size:28px;
  margin-top:10px;
}

#textoIA, #textoUsuario {
  min-height:40px;
  margin-top:10px;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<h2>Elayon • Presença</h2>

<div class="card">
  <b>Contexto</b><br>
  <input id="contexto" placeholder="Digite o tema..." style="width:100%;padding:10px;">
  <button class="primary" id="btnIniciar">Iniciar Sessão</button>
</div>

<div class="card">
  <b>IA falando</b>
  <div id="textoIA"></div>
</div>

<div class="card">
  <b>Tempo</b>
  <div id="cronometro">0</div>
</div>

<div class="card">
  <b>Sua fala</b>
  <div id="textoUsuario"></div>

  <button class="primary" id="btnResponder">Responder</button>
  <button class="secondary" id="btnRepetir">Repetir instrução</button>
</div>

<script src="https://paulorobertoxavierjunior-create.github.io/elayon-presenca-lab/js/base.js"></script>

<script>

const tempoTotal = 10;
let tempoRestante = tempoTotal;
let timer = null;

let recognition;
let ultimoAudio = Date.now();

const textoIA = document.getElementById("textoIA");
const textoUsuario = document.getElementById("textoUsuario");

function falarIA(texto) {

  textoIA.textContent = "";

  const utter = new SpeechSynthesisUtterance(texto);
  utter.lang = "pt-BR";

  // escreve no tempo da fala
  let i = 0;

  utter.onstart = () => {
    escrever();
  };

  function escrever() {
    if (i < texto.length) {
      textoIA.textContent += texto[i];
      i++;
      setTimeout(escrever, 40); // ritmo humano
    }
  }

  speechSynthesis.speak(utter);
}

function iniciarCronometro() {
  tempoRestante = tempoTotal;
  document.getElementById("cronometro").textContent = tempoRestante;

  clearInterval(timer);

  timer = setInterval(() => {
    tempoRestante--;
    document.getElementById("cronometro").textContent = tempoRestante;

    if (tempoRestante <= 0) {
      clearInterval(timer);
    }

  }, 1000);
}

function iniciarMicrofone() {

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  recognition = new SpeechRecognition();
  recognition.lang = "pt-BR";
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onresult = (e) => {

    ultimoAudio = Date.now();

    let texto = "";

    for (let i = e.resultIndex; i < e.results.length; i++) {
      texto += e.results[i][0].transcript;
    }

    textoUsuario.textContent = texto;
  };

  recognition.start();

  // controle de silêncio real (4s após parar de falar)
  setInterval(() => {
    if (Date.now() - ultimoAudio > 4000) {
      recognition.stop();
    }
  }, 1000);
}

function iniciarSessao() {

  const contexto = document.getElementById("contexto").value || "tema livre";

  const frase = `Olá, bem-vindo aos sistemas Elayon. Fale sobre ${contexto}.`;

  falarIA(frase);

  iniciarCronometro();

}

function responder() {
  iniciarMicrofone();
  iniciarCronometro();
}

function repetir() {
  iniciarSessao();
}

// eventos
document.getElementById("btnIniciar").onclick = iniciarSessao;
document.getElementById("btnResponder").onclick = responder;
document.getElementById("btnRepetir").onclick = repetir;

</script>

</body>
</html>
