<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elayon • Check Lab</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    padding: 20px;
}

h1 { margin-bottom: 20px; }

.item {
    padding: 12px;
    margin-bottom: 8px;
    border-radius: 8px;
}

.ok { background: #065f46; }
.fail { background: #7f1d1d; }

button {
    margin-top: 10px;
    padding: 10px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>🧪 Elayon Lab Check</h1>

<div id="results"></div>

<button onclick="testarExecucao()">Testar Execução</button>

<!-- ===== CARREGA LAB ===== -->
<script src="https://paulorobertoxavierjunior-create.github.io/elayon-presenca-lab/js/base.js"></script>
<script src="https://paulorobertoxavierjunior-create.github.io/elayon-presenca-lab/js/teste-tts.js"></script>
<script src="https://paulorobertoxavierjunior-create.github.io/elayon-presenca-lab/js/teste-microfone.js"></script>
<script src="https://paulorobertoxavierjunior-create.github.io/elayon-presenca-lab/js/teste-transcricao.js"></script>
<script src="https://paulorobertoxavierjunior-create.github.io/elayon-presenca-lab/js/teste-loop.js"></script>
<script src="https://paulorobertoxavierjunior-create.github.io/elayon-presenca-lab/js/teste-crs.js"></script>

<script>

// 🔎 LISTA DE FUNÇÕES ESPERADAS
const funcoes = [
    "ttsFalar",
    "microfoneIniciar",
    "transcricaoIniciar",
    "loopExecutar",
    "crsExecutar"
];

function checkLab() {
    const container = document.getElementById("results");

    funcoes.forEach(fn => {
        const existe = window.ElayonLab && typeof window.ElayonLab[fn] === "function";

        const div = document.createElement("div");
        div.className = "item " + (existe ? "ok" : "fail");
        div.innerText = `${existe ? "✅" : "❌"} ${fn}`;

        container.appendChild(div);
    });
}

// ▶️ TESTE REAL
async function testarExecucao() {
    try {
        if (window.ElayonLab?.ttsFalar) {
            await window.ElayonLab.ttsFalar("Teste de voz funcionando.");
        }

        if (window.ElayonLab?.microfoneIniciar) {
            console.log("🎤 Microfone OK");
        }

        if (window.ElayonLab?.transcricaoIniciar) {
            console.log("🧠 Transcrição OK");
        }

        alert("Teste disparado. Veja console também.");
    } catch (e) {
        console.error(e);
        alert("Erro na execução");
    }
}

// 🚀 INICIAR
checkLab();

</script>

</body>
</html>
