<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRESENÇA | PAINEL DE CONTROLE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        elayon: {
                            bg: '#000000', // PRETO TOTAL
                            panel: '#0a0a0a',
                            border: '#222222',
                            accent: '#2563eb',
                            glow: '#3b82f6',
                            success: '#10b981',
                            warning: '#f59e0b',
                            danger: '#ef4444'
                        }
                    },
                    fontFamily: {
                        mono: ['JetBrains Mono', 'Consolas', 'monospace'],
                        sans: ['Inter', 'sans-serif'],
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'rec-blink': 'blink 1s infinite'
                    },
                    keyframes: {
                        blink: {
                            '0%, 100%': { opacity: 1 },
                            '50%': { opacity: 0.3 }
                        }
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .glass-panel {
                background: rgba(15, 15, 15, 0.9);
                border: 1px solid rgba(255, 255, 255, 0.08);
            }
            .glow {
                box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
            }
            .bar {
                width: 4px;
                background: linear-gradient(to top, #3b82f6, #10b981);
                border-radius: 2px;
                transition: height 0.1s ease;
            }
            .logo-container img {
                max-width: 120px; /* Ajuste o tamanho da logo aqui */
                height: auto;
                display: block;
                margin: 0 auto;
            }
        }
    </style>
</head>
<body class="bg-elayon-bg text-white min-h-screen font-sans overflow-x-hidden">

    <div class="container max-w-2xl mx-auto px-4 py-6 relative z-10">
        
        <!-- HEADER COM LOGO -->
        <header class="text-center mb-6 pb-4">
            
            <!-- AQUI ESTÁ A LOGO -->
            <div class="logo-container mb-4">
                <img src="IMG-20250610-WA0002.jpg" alt="Logo Elayon">
            </div>

            <h1 class="text-3xl font-bold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-400">
                SISTEMAS ELAYON
            </h1>
            <h2 class="text-lg font-mono opacity-80 mt-1">MÓDULO PRESENÇA <span class="text-elayon-glow">v2.0</span></h2>
            <div class="w-20 h-px bg-gradient-to-r from-blue-500 to-cyan-400 mx-auto my-3 rounded-full opacity-50"></div>
            <p class="text-xs opacity-60 mt-2">HUMANIDADE E TECNOLOGIA EM HARMONIA</p>
        </header>

        <!-- RESTO DO CÓDIGO CONTINUA IGUAL... -->

    </div>

</body>
</html>
