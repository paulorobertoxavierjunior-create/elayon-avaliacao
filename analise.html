<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRESENÇA | CAPTURA DE ÁUDIO BRUTO</title> 
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 🔌 CARREGA O TÚNEL -->
    <script src="tunnel.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        elayon: {
                            bg: '#000000',
                            panel: '#0a0a0a',
                            border: '#222222',
                            accent: '#2563eb',
                            glow: '#4f9eff',
                            success: '#10b981',
                            warning: '#f59e0b',
                            danger: '#ef4444'
                        }
                    },
                    fontFamily: {
                        mono: ['JetBrains Mono', 'Consolas', 'monospace'],
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    animation: {
                        'rec-blink': 'blink 1s infinite'
                    },
                    keyframes: {
                        blink: {
                            '0%, 100%': { opacity: 1 },
                            '50%': { opacity: 0.3 }
                        }
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            .glass-panel {
                background: rgba(15, 15, 15, 0.9);
                border: 1px solid rgba(255, 255, 255, 0.08);
            }
            .glow {
                box-shadow: 0 0 15px rgba(79, 158, 255, 0.5);
            }
            .bar {
                width: 4px;
                background: linear-gradient(to top, #4f9eff, #10b981);
                border-radius: 2px;
                transition: height 0.1s ease;
            }
            .text-gradient {
                background-clip: text;
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }
            .log-box {
                background: #050505;
                border: 1px solid #222;
                color: #0f0;
                font-family: monospace;
                font-size: 12px;
                padding: 10px;
                height: 150px;
                overflow-y: auto;
                white-space: pre-wrap;
            }
        }
    </style>
</head>
<body class="bg-black text-white min-h-screen font-sans overflow-x-hidden">

    <div class="container max-w-2xl mx-auto px-4 py-8 relative z-10">
        
        <header class="text-center mb-8 pb-6 border-b border-gray-800">
            <div class="mb-6">
                <img src="IMG-20250610-WA0002.jpg" alt="Logo Elayon" class="max-w-[140px mx-auto">
            </div>
            <h1 class="text-4xl font-bold tracking-wider text-gradient bg-gradient-to-r from-blue-400 to-cyan-400">MÓDULO PRESENÇA</h1>
            <h2 class="text-xl font-mono opacity-80 mt-2">CAPTURA DE ÁUDIO BRUTO</h2>
            <p class="text-sm opacity-60 mt-3">Microfone aberto contínuo. Sem cortes, sem ruídos, sem plop-plop.</p>
        </header>

        <main class="space-y-8">
            
            <!-- ================================================== -->
            <!-- 📦 SEÇÃO 1: PAINEL DE CONTROLE                     -->
            <!-- ================================================== -->
            <section class="glass-panel rounded-2xl p-6">
                <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <i class="fas fa-microphone-lines text-elayon-glow"></i> ESTÚDIO DE CAPTAÇÃO
                </h3>

                <div class="bg-black/50 rounded-xl p-6 h-40 flex flex-col items-center justify-center relative overflow-hidden mb-6">
                    <div class="absolute top-3 left-3 text-xs font-mono opacity-40">WAVEFORM</div>
                    <div id="visualizer" class="flex items-end gap-1 h-20"></div>
                    <div id="timerDisplay" class="absolute bottom-4 right-4 font-mono text-3xl font-bold opacity-80">00:00</div>
                    <div id="recIndicator" class="absolute top-4 right-4 flex items-center gap-2 text-red-500 opacity-0">
                        <i class="fas fa-circle animate-rec-blink"></i>
                        <span class="font-mono text-sm">LIVE</span>
                    </div>
                </div>

                <div class="flex items-center justify-center gap-4 py-4">
                    <button id="btnRecord" class="w-20 h-20 rounded-full bg-red-600 hover:bg-red-700 text-white text-2xl flex items-center justify-center transition-all duration-300 shadow-lg shadow-red-900/30 active:scale-95">
                        <i class="fas fa-circle"></i>
                    </button>
                </div>

                <div id="actionButtons" class="grid grid-cols-3 gap-4 opacity-100 transition-all duration-500 mt-4">
                    <button id="btnPause" class="glass-panel rounded-xl p-4 flex items-center justify-center gap-2 hover:bg-white/5 transition">
                        <i class="fas fa-pause text-yellow-400"></i><span>PAUSAR</span>
                    </button>
                    <button id="btnStop" class="glass-panel rounded-xl p-4 flex items-center justify-center gap-2 hover:bg-white/5 transition border border-green-500/50">
                        <i class="fas fa-check text-green-400"></i><span>FINALIZAR</span>
                    </button>
                    <button id="btnClear" class="glass-panel rounded-xl p-4 flex items-center justify-center gap-2 hover:bg-white/5 transition">
                        <i class="fas fa-trash text-red-400"></i><span>APAGAR</span>
                    </button>
                </div>
            </section>

            <!-- ================================================== -->
            <!-- 📦 SEÇÃO 2: UPLOAD DE ARQUIVO                      -->
            <!-- ================================================== -->
            <section class="text-center">
                <div class="flex items-center gap-4 w-full opacity-60 my-2">
                    <div class="h-px bg-gray-700 flex-grow"></div><span class="text-sm">OU</span><div class="h-px bg-gray-700 flex-grow"></div>
                </div>
                <label class="glass-panel rounded-2xl p-6 border-2 border-dashed border-gray-700 flex flex-col items-center justify-center gap-3 cursor-pointer hover:border-blue-500 hover:bg-blue-500/5 transition group">
                    <i class="fas fa-folder-open text-3xl text-gray-400 group-hover:text-blue-400 group-hover:scale-110 transition"></i>
                    <span class="font-bold text-lg">CARREGAR ARQUIVO DO CELULAR</span>
                    <p class="text-sm opacity-60">Selecione .wav, .mp3, .m4a</p>
                    <input type="file" accept="audio/*" class="hidden" id="fileInput">
                </label>
                <p id="fileStatus" class="text-sm mt-3 opacity-60 hidden">Arquivo: <span id="fileName"></span></p>
            </section>

            <!-- ================================================== -->
            <!-- 📦 SEÇÃO 3: ARQUIVO GERADO / CARREGADO            -->
            <!-- ================================================== -->
            <section id="fileSection" class="glass-panel rounded-2xl p-6 hidden">
                <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <i class="fas fa-file-audio text-elayon-glow"></i> ARQUIVO PRONTO
                </h3>
                
                <div class="flex flex-col gap-4">
                    <audio id="audioPlayer" controls class="w-full">
                    
                    <div class="grid grid-cols-2 gap-4">
                        <a id="btnDownload" href="#" download="emanacao_bruta.wav" class="glass-panel rounded-xl p-4 text-center hover:bg-blue-500/10 transition">
                            <i class="fas fa-download text-blue-400"></i> SALVAR ARQUIVO
                        </a>
                        <button id="btnSendCRS" class="glass-panel rounded-xl p-4 hover:bg-green-500/10 transition">
                            <i class="fas fa-satellite-dish text-green-400"></i> ENVIAR PARA CRS
                        </button>
                    </div>
                </div>
            </section>

            <!-- ================================================== -->
            <!-- 📦 SEÇÃO 4: CAIXA DE LOG                          -->
            <!-- ================================================== -->
            <section class="glass-panel rounded-2xl p-6">
                <h3 class="text-lg font-bold mb-3 flex items-center gap-2">
                    <i class="fas fa-terminal text-gray-400"></i> LOG DO SISTEMA
                </h3>
                <div id="logTech" class="log-box">
[INFO] Sistema pronto. Aguardando comando...
                </div>
                <button id="btnClearLog" class="text-xs text-gray-500 mt-2 hover:text-white">Limpar Log</button>
            </section>

            <!-- ================================================== -->
            <!-- 📦 SEÇÃO 5: RELATÓRIO CRS                         -->
            <!-- ================================================== -->
            <div id="reportZone" class="hidden mt-8">
                <h3 class="text-lg font-bold mb-4 border-b border-gray-800 pb-2 flex items-center gap-2">
                    <i class="fas fa-file-chart-column text-elayon-glow"></i> MAPA DE DADOS | CRS
                </h3>
                <div class="glass-panel rounded-xl p-5 font-mono text-sm leading-relaxed min-h-[250px] whitespace-pre-line" id="relatorioFinal">
                    Dados da análise aparecerão aqui...
                </div>
            </div>

        </main>
    </div>

    <script>
        // ==================================================
        // 🚀 INICIALIZAÇÃO GERAL
        // ==================================================
        let mediaRecorder;
        let audioChunks = [];
        let audioBlob;
        let isRecording = false;
        let isPaused = false;
        let startTime;
        let interval;
        let audioContext;
        let analyser;
        let dataArray;
        let bufferLength;
        let bars;

        // ==================================================
        // 📡 ELEMENTOS DA INTERFACE
        // ==================================================
        const btnRecord = document.getElementById('btnRecord');
        const btnPause = document.getElementById('btnPause');
        const btnStop = document.getElementById('btnStop');
        const btnClear = document.getElementById('btnClear');
        const btnSendCRS = document.getElementById('btnSendCRS');
        const btnDownload = document.getElementById('btnDownload');
        const timerDisplay = document.getElementById('timerDisplay');
        const recIndicator = document.getElementById('recIndicator');
        const visualizer = document.getElementById('visualizer');
        const logBox = document.getElementById('logTech');
        const fileSection = document.getElementById('fileSection');
        const audioPlayer = document.getElementById('audioPlayer');
        const reportZone = document.getElementById('reportZone');
        const relatorioFinal = document.getElementById('relatorioFinal');
        const fileInput = document.getElementById('fileInput');
        const fileStatus = document.getElementById('fileStatus');
        const fileNameSpan = document.getElementById('fileName');

        // ==================================================
        // 🛠️ FUNÇÕES AUXILIARES
        // ==================================================
        function log(msg) {
            const time = new Date().toLocaleTimeString("pt-BR");
            logBox.textContent += `[${time}] ${msg}\n`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        function initVisualizer() {
            visualizer.innerHTML = "";
            for(let i=0; i<30; i++) {
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = '5px';
                visualizer.appendChild(bar);
            }
            bars = document.querySelectorAll('.bar');
            log("🎨 Visualizador inicializado");
        }

        function updateTimer() {
            const diff = Math.floor((Date.now() - startTime) / 1000);
            const min = Math.floor(diff / 60).toString().padStart(2,'0');
            const sec = (diff % 60).toString().padStart(2,'0');
            timerDisplay.textContent = `${min}:${sec}`;
        }

        function drawWaveform() {
            if (!isRecording || isPaused) return;
            requestAnimationFrame(drawWaveform);
            analyser.getByteFrequencyData(dataArray);
            let startIndex = Math.floor(bufferLength * 0.1);
            let endIndex = Math.floor(bufferLength * 0.6);
            let usableData = Array.from(dataArray).slice(startIndex, endIndex);

            for (let i = 0; i < bars.length; i++) {
                let dataIndex = Math.floor(i * usableData.length / bars.length);
                let height = usableData[dataIndex] / 2.5;
                bars[i].style.height = (height < 5 ? 5 : height) + 'px';
            }
        }

        // ==================================================
        // 📂 FUNÇÕES DE UPLOAD DE ARQUIVO
        // ==================================================
        fileInput.addEventListener('change', function() {
            if(this.files.length > 0) {
                const file = this.files[0];
                audioBlob = file; // Usa o arquivo carregado como fonte
                const audioUrl = URL.createObjectURL(file);
                
                fileNameSpan.textContent = file.name;
                fileStatus.classList.remove('hidden');
                audioPlayer.src = audioUrl;
                btnDownload.href = audioUrl;
                btnDownload.download = file.name;
                
                fileSection.classList.remove('hidden');
                log(`📂 Arquivo carregado: ${file.name} (${file.size.toLocaleString()} bytes)`);
            }
        });

        // ==================================================
        // 🎤 FUNÇÕES PRINCIPAIS DO MICROFONE
        // ==================================================
        btnRecord.addEventListener('click', async () => {
            if (!isRecording) {
                await startRecording();
            }
        });

        btnPause.addEventListener('click', () => {
            if (!isRecording) return;
            
            if (!isPaused) {
                mediaRecorder.pause();
                isPaused = true;
                btnPause.innerHTML = '<i class="fas fa-play text-green-400"></i><span>CONTINUAR</span>';
                clearInterval(interval);
                log("⏸️ Gravação Pausada");
            } else {
                mediaRecorder.resume();
                isPaused = false;
                btnPause.innerHTML = '<i class="fas fa-pause text-yellow-400"></i><span>PAUSAR</span>';
                startTime = Date.now() - (parseInt(timerDisplay.textContent.split(':')[0])*60 + parseInt(timerDisplay.textContent.split(':')[1])) * 1000;
                interval = setInterval(updateTimer, 1000);
               
                drawWaveform();

            } catch (err) {
                log(`❌ ERRO: ${err.message}`);
                alert("Erro ao acessar microfone: " + err.message);
            }
        }

        // --- PARAR GRAVAÇÃO ---
        function stopRecording() {
            if (!isRecording) return;
            
            mediaRecorder.stop();
            mediaRecorder.stream.getTracks().forEach(track => track.stop());
            
            isRecording = false;
            clearInterval(interval);
            
            btnRecord.innerHTML = '<i class="fas fa-microphone"></i>';
            btnRecord.classList.remove('bg-gray-700');
            btnRecord.classList.add('bg-red-600');
            recIndicator.classList.add('opacity-0');
            btnPause.innerHTML = '<i class="fas fa-pause text-yellow-400"></i><span>PAUSAR</span>';

            log("🛑 Gravação finalizada.");
        }

        // ==================================================
        // 📡 INTEGRAÇÃO COM O CRS - MODO TREINAMENTO LOCAL
        // ==================================================
        btnSendCRS.addEventListener('click', async () => {
            if (!audioBlob) {
                log("⚠️ Nenhum áudio carregado ou gravado!");
                return;
            }

            log("🚀 Iniciando análise CRS...");
            reportZone.classList.remove('hidden');
            relatorioFinal.textContent = "Processando emanação...\nGerando mapa de frequências...\nAguarde...";

            try {
                // 🧪 SIMULAÇÃO LOCAL PARA TREINAMENTO
                // Aqui geramos os dados fictícios mas com lógica real
                // Depois trocamos por: await window.ELAYON_TUNNEL.crs.analyze(payload)
                
                const dadosSimulados = {
                    ressonancia: Math.floor(Math.random() * 25) + 75,
                    frequencia: Math.floor(Math.random() * 150) + 420,
                    alinhamento: Math.floor(Math.random() * 20) + 80,
                    densidade: (Math.random() * 0.4 + 0.6).toFixed(2),
                    pausas: Math.floor(Math.random() * 8) + 4,
                    interpretacao: "Análise concluída em modo local.\nOs índices indicam alta coerência e conexão estável.\nSeu padrão energético está registrado no sistema."
                };

                log("✅ Análise concluída (Modo Local)");

                // Monta o relatório final
                const relatorio = `
=============================================
            RELATÓRIO DE EMANAÇÃO
               MÓDULO PRESENÇA
=============================================

STATUS: CONCLUÍDO
ORIGEM: ${fileNameSpan.textContent || "Gravação Interna"}
TAMANHO: ${audioBlob.size.toLocaleString()} bytes
DURAÇÃO: ${timerDisplay.textContent}

--- MAPA DE FREQUÊNCIA ---

📡 RESSONÂNCIA: ${dadosSimulados.ressonancia}%
    Nível de vibração e presença.

🎵 FREQUÊNCIA MÉDIA: ${dadosSimulados.frequencia} Hz
    Tom predominante da emissão.

✨ ALINHAMENTO: ${dadosSimulados.alinhamento}%
    Coerência entre intenção e emissão.

📊 DENSIDADE: ${dadosSimulados.densidade}
    Concentração de informação.

⏸️ PAUSAS ESTRATÉGICAS: ${dadosSimulados.pausas}
    Momentos de silêncio e peso.

--- INTERPRETAÇÃO SIMBÓLICA ---

${dadosSimulados.interpretacao}

=============================================
            SISTEMAS ELAYON
=============================================
                `;

                relatorioFinal.textContent = relatorio;

            } catch (err) {
                log(`❌ FALHA NA ANÁLISE: ${err.message}`);
                relatorioFinal.textContent = `⚠️ ERRO NO SISTEMA\n\n${err.message}`;
            }
        });

        // ==================================================
        // 🧹 LIMPAR LOG E RESET
        // ==================================================
        document.getElementById('btnClearLog').addEventListener('click', () => {
            logBox.textContent = "";
            log("[LOG ZEBRADO]");
        });

        btnClear.addEventListener('click', () => {
            audioChunks = [];
            audioBlob = null;
            fileInput.value = '';
            fileStatus.classList.add('hidden');
            fileSection.classList.add('hidden');
            reportZone.classList.add('hidden');
            timerDisplay.textContent = "00:00";
            if(bars) bars.forEach(bar => bar.style.height = '5px');
            log("🧹 Sistema resetado. Pronto para nova captação.");
        });

        // ==================================================
        // 🚀 INICIALIZAÇÃO FINAL
        // ==================================================
        initVisualizer();
        log("⚡ Sistema carregado. Modo Áudio Bruto ativo.");

    </script>
</body>
</html>
